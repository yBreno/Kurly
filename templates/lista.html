<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Minhas fontes e icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playwrite+IE:wght@100..400&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style-lista.css') }}"> <!-- Para rodar no FLASK sem dar erro -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Agenda</title>
</head>
<body>
         
        <header id="cabecalhoInicial">
            <div class="opcoesIniciais">
                
                <a href="/">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo Kurly"> <!-- Para rodar no FLASK sem dar erro-->
                </a>

                <a href="/" class="inicio">Início</a>

            </div>
        </header>
        
        <script> //Script do botão de exclusão com o Sweet Alert
            function confirmarExclusao(id){
                Swal.fire({
                    title: "Tem certeza?",
                    text: "Isso não pode ser desfeito!",
                    icon: "warning",
                    showCancelButton: true,
                    confirmButtonText: "Sim, excluir",
                    cancelButtonText: "Cancelar",
                    confirmButtonColor: "#E91E63",
                    cancelButtonColor: "#999"
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = "/excluir/" + id + "?sucesso=1";
                    }
                });
            }
        </script>
        <div class="lista-agendamentos">
            
            <!-- Colocar as informações do Flask no HTML -->
            {% for ag in agendamentos %}
            <div class="item-agendamento">

                <div class="data">
                    <span class="dia">{{ ag[1][8:10] }}/{{ ag[1][5:7] }}/</span>  <!-- Fatiamento simples de string -->
                    <span class="ano">{{ ag[1][0:4] }}</span>
                </div>
                <div class="data">
                    <span class="hora">{{ ag[1][11:16] }}</span> <!-- Fatiamento do i[11] ate i[16]-->
                </div>

                <div class="conteudo">
                    <p class="nome">
                        Cliente: <span>{{ ag[2] }}</span> <!-- pega o nome da string-->
                    </p>

                    <p class="servico">
                        Serviço: <span>{{ ag[3] }}</span> <!-- pega o tipo de servico da string-->
                    </p>

                    <p class="telefone">
                        Telefone: <span>{{ ag[4] }}</span> <!-- pega o telefone da string-->
                    </p>

                    <div class="acoes">
                        <a href="/editar/{{ ag[0] }}"><button id="alterar">Alterar</button></a>
                        
                        <button onclick="confirmarExclusao('{{ ag[0] }}')" id="excluir">Excluir</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        
</body>
</html>
