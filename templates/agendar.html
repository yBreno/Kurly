<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- MINHAS FONTES PARA TEXTOS -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> <!-- Para rodar no FLASK sem dar erro -->
        <title>Kurly Studio</title>
    </head>
    
    <body>
         <section class="agendamento">
            <div class="container">
        
            <h1>Agendamento</h1>
            
        
            <form id="agendamento">
        
                <div class="input-group">
                <input type="text" id="nome" placeholder=" ">
                <label>Nome da cliente</label>
                </div>
        
                <div class="input-group">
                <input type="email" id="email" placeholder=" ">
                <label>Email</label>
                </div>
        
                <div class="input-group">
                <input type="password" id="senha" placeholder=" ">
                <label>Senha</label>
                </div>
        
                <div class="input-group">
                <input type="password" id="repetirSenha" placeholder=" ">
                <label>Repetir Senha</label>
                </div>
        
                <div class="input-group">
                <input type="text" id="telefone" placeholder=" ">
                <label>Telefone</label>
                </div>
        
                <button type="submit">Criar Conta</button>
        
            </form>
        
            </div>
        </section>
    </body>
</html>
